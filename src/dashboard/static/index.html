<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Observability Agent — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
    --text: #e2e8f0; --muted: #8892a4; --accent: #6366f1;
    --green: #22c55e; --amber: #f59e0b; --red: #ef4444; --purple: #a855f7;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
  #root { display: flex; flex-direction: column; min-height: 100vh; }

  /* Layout */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 56px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
         animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* KPI cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
         padding: 16px 20px; }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Two-column layout */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media(max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Panels */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border);
                  font-weight: 600; font-size: 13px; display: flex; align-items: center;
                  justify-content: space-between; }
  .panel-body { padding: 0; }

  /* Table */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { padding: 10px 16px; text-align: left; font-size: 11px; color: var(--muted);
             text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
  .tbl td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: rgba(255,255,255,.02); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-critical { background: rgba(239,68,68,.15); color: #f87171; }
  .badge-high     { background: rgba(245,158,11,.15); color: #fbbf24; }
  .badge-medium   { background: rgba(99,102,241,.15); color: #818cf8; }
  .badge-low      { background: rgba(34,197,94,.15);  color: #4ade80; }
  .badge-sent        { background: rgba(34,197,94,.15);  color: #4ade80; }
  .badge-suppressed  { background: rgba(100,116,139,.15); color: #94a3b8; }
  .badge-failed      { background: rgba(239,68,68,.15); color: #f87171; }

  /* Score bar */
  .score-bar { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 6px; }
  .score-fill { height: 100%; border-radius: 3px; }

  /* WS status */
  .ws-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .ws-connected    { background: rgba(34,197,94,.15); color: #4ade80; }
  .ws-disconnected { background: rgba(239,68,68,.15); color: #f87171; }
  .ws-connecting   { background: rgba(245,158,11,.15); color: #fbbf24; }

  /* Root cause text */
  .root-cause { font-size: 13px; line-height: 1.5; color: var(--text); }
  .root-cause-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Trend spark */
  .spark { display: flex; align-items: flex-end; gap: 2px; height: 28px; }
  .spark-bar { width: 6px; border-radius: 2px 2px 0 0; min-height: 2px; }

  /* Empty state */
  .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

  /* Refresh timestamp */
  .refresh-ts { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : '';

const WS_URL = (window.location.protocol === 'https:' ? 'wss:' : 'ws:')
  + '//' + window.location.host + '/ws/live';

// ── helpers ─────────────────────────────────────────────────────────
function fmt(n, decimals = 0) {
  if (n == null) return '—';
  return Number(n).toLocaleString(undefined, {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}
function ts(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString();
}
function scoreColor(s) {
  if (s >= 0.8) return '#ef4444';
  if (s >= 0.6) return '#f59e0b';
  if (s >= 0.4) return '#6366f1';
  return '#22c55e';
}

// ── KPI card ─────────────────────────────────────────────────────────
function KPI({ label, value, sub, color }) {
  return (
    <div className="kpi">
      <div className="kpi-label">{label}</div>
      <div className="kpi-value" style={{ color: color || 'var(--text)' }}>{value ?? '—'}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

// ── Severity badge ────────────────────────────────────────────────────
function SevBadge({ sev }) {
  return <span className={`badge badge-${sev?.toLowerCase()}`}>{sev}</span>;
}

// ── Score bar ─────────────────────────────────────────────────────────
function ScoreBar({ score }) {
  const pct = Math.round((score || 0) * 100);
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center' }}>
      <span className="score-bar">
        <span className="score-fill" style={{ width: pct + '%', background: scoreColor(score) }} />
      </span>
      <span style={{ fontSize: 12, color: scoreColor(score) }}>{pct}%</span>
    </span>
  );
}

// ── Anomaly table ─────────────────────────────────────────────────────
function AnomalyTable({ rows }) {
  if (!rows?.length) return <div className="empty">No anomalies yet</div>;
  return (
    <table className="tbl">
      <thead>
        <tr>
          <th>Service</th><th>Root cause</th><th>Score</th><th>Severity</th><th>Time</th>
        </tr>
      </thead>
      <tbody>
        {rows.map(r => (
          <tr key={r.id}>
            <td><code style={{ fontSize: 12 }}>{r.service_name}</code></td>
            <td>
              <div className="root-cause">{r.root_cause?.slice(0, 80)}{r.root_cause?.length > 80 ? '…' : ''}</div>
              <div className="root-cause-sub">{(r.confidence * 100).toFixed(0)}% confidence</div>
            </td>
            <td><ScoreBar score={r.anomaly_score} /></td>
            <td><SevBadge sev={r.severity} /></td>
            <td style={{ color: 'var(--muted)', fontSize: 12 }}>{ts(r.analyzed_at)}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ── Alert table ───────────────────────────────────────────────────────
function AlertTable({ rows }) {
  if (!rows?.length) return <div className="empty">No alerts yet</div>;
  return (
    <table className="tbl">
      <thead>
        <tr><th>Service</th><th>Title</th><th>Severity</th><th>Status</th><th>Time</th></tr>
      </thead>
      <tbody>
        {rows.map(r => (
          <tr key={r.id}>
            <td><code style={{ fontSize: 12 }}>{r.service_name}</code></td>
            <td style={{ fontSize: 12, maxWidth: 220, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {r.title}
            </td>
            <td><SevBadge sev={r.severity} /></td>
            <td><span className={`badge badge-${r.status}`}>{r.status}</span></td>
            <td style={{ color: 'var(--muted)', fontSize: 12 }}>{ts(r.created_at)}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ── Mini sparkline ────────────────────────────────────────────────────
function Spark({ values }) {
  const max = Math.max(...values, 0.01);
  return (
    <div className="spark">
      {values.map((v, i) => (
        <div key={i} className="spark-bar"
          style={{ height: Math.max(2, (v / max) * 28) + 'px', background: scoreColor(v) }} />
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function App() {
  const [summary, setSummary]     = useState(null);
  const [anomalies, setAnomalies] = useState([]);
  const [alerts, setAlerts]       = useState([]);
  const [wsStatus, setWsStatus]   = useState('connecting');
  const [lastUpdate, setLastUpdate] = useState(null);
  const [sparkData, setSparkData]   = useState([]);
  const wsRef = useRef(null);

  // Fetch initial REST data
  const fetchData = useCallback(async () => {
    try {
      const [sumRes, anomRes, alertRes] = await Promise.all([
        fetch(`${API}/api/metrics/summary`).then(r => r.json()),
        fetch(`${API}/api/anomalies?limit=10`).then(r => r.json()),
        fetch(`${API}/api/alerts?limit=8`).then(r => r.json()),
      ]);
      setSummary(sumRes);
      setAnomalies(anomRes.anomalies || []);
      setAlerts(alertRes.alerts || []);
    } catch (e) {
      console.error('Fetch error:', e);
    }
  }, []);

  // WebSocket connection
  useEffect(() => {
    function connect() {
      setWsStatus('connecting');
      const ws = new WebSocket(WS_URL);
      wsRef.current = ws;

      ws.onopen = () => {
        setWsStatus('connected');
      };

      ws.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          if (data.type === 'live_update') {
            if (data.anomalies?.length) setAnomalies(data.anomalies);
            if (data.alerts?.length)    setAlerts(data.alerts);
            setLastUpdate(data.timestamp);
            // Update sparkline with latest anomaly score
            if (data.anomalies?.[0]?.anomaly_score != null) {
              setSparkData(prev => [...prev.slice(-19), data.anomalies[0].anomaly_score]);
            }
          } else if (data.type === 'anomaly_alert') {
            setAnomalies(prev => [data.anomaly, ...prev.slice(0, 9)]);
          }
        } catch (e) {}
      };

      ws.onclose = () => {
        setWsStatus('disconnected');
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        setWsStatus('disconnected');
      };
    }

    connect();
    fetchData();
    const interval = setInterval(fetchData, 30000);

    return () => {
      clearInterval(interval);
      wsRef.current?.close();
    };
  }, [fetchData]);

  const ing  = summary?.ingestion  || {};
  const det  = summary?.detection  || {};
  const alrt = summary?.alerting   || {};

  return (
    <>
      {/* Top bar */}
      <div className="topbar">
        <div className="topbar-title">
          <div className="dot" />
          Observability Agent
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <span className={`ws-badge ws-${wsStatus}`}>
            {wsStatus === 'connected' ? '⬤ Live' : wsStatus === 'connecting' ? '⬤ Connecting…' : '⬤ Reconnecting…'}
          </span>
          {lastUpdate && (
            <span className="refresh-ts">Last update: {ts(lastUpdate)}</span>
          )}
        </div>
      </div>

      <div className="main">

        {/* KPI row */}
        <div className="kpi-grid">
          <KPI label="Logs / last 1h"   value={fmt(ing.logs_last_1h)}   sub={`${fmt(ing.logs_last_24h)} in 24h`} />
          <KPI label="Error rate (1h)"  value={`${fmt(ing.error_rate_1h_pct, 1)}%`}
               color={ing.error_rate_1h_pct > 10 ? 'var(--red)' : ing.error_rate_1h_pct > 3 ? 'var(--amber)' : 'var(--green)'} />
          <KPI label="Anomalies (24h)"  value={fmt(det.anomalies_last_24h)}
               sub={`${fmt(det.critical_last_24h)} critical`}
               color={det.critical_last_24h > 0 ? 'var(--red)' : undefined} />
          <KPI label="Avg confidence"   value={`${fmt((det.avg_confidence || 0) * 100, 0)}%`}
               color={(det.avg_confidence || 0) > 0.7 ? 'var(--green)' : 'var(--amber)'} />
          <KPI label="Alerts sent (24h)"      value={fmt(alrt.sent_last_24h)}    color="var(--purple)" />
          <KPI label="Alerts suppressed (24h)" value={fmt(alrt.suppressed_last_24h)} color="var(--muted)" />
          <KPI label="Avg analysis time" value={det.avg_analysis_ms ? `${fmt(det.avg_analysis_ms, 0)} ms` : '—'} />
          <KPI label="Connected clients" value={anomalies.length ? '—' : '0'} sub="WebSocket" />
        </div>

        {/* Score trend + pipeline health */}
        {sparkData.length > 1 && (
          <div style={{ marginBottom: 20, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '14px 20px', display: 'flex', alignItems: 'center', gap: 20 }}>
            <span style={{ fontSize: 12, color: 'var(--muted)', minWidth: 100 }}>Anomaly score trend</span>
            <Spark values={sparkData} />
            <span style={{ fontSize: 12, color: 'var(--muted)' }}>last {sparkData.length} windows</span>
          </div>
        )}

        {/* Main content grid */}
        <div className="grid-2">

          {/* Anomaly feed */}
          <div className="panel">
            <div className="panel-header">
              <span>Recent anomalies</span>
              <span style={{ fontSize: 11, color: 'var(--muted)' }}>{anomalies.length} shown</span>
            </div>
            <div className="panel-body">
              <AnomalyTable rows={anomalies} />
            </div>
          </div>

          {/* Alert feed */}
          <div className="panel">
            <div className="panel-header">
              <span>Recent alerts</span>
              <span style={{ fontSize: 11, color: 'var(--muted)' }}>{alerts.length} shown</span>
            </div>
            <div className="panel-body">
              <AlertTable rows={alerts} />
            </div>
          </div>

        </div>

        {/* Footer */}
        <div style={{ textAlign: 'center', color: 'var(--muted)', fontSize: 11, paddingBottom: 24 }}>
          Observability Agent — Module 5 Dashboard  •  WebSocket push every 5s  •  REST poll every 30s
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
